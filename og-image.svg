<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f1410"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(34,197,94,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(100,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(200,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(400,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(500,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(600,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(700,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(800,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(900,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(1000,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(1100,0)"/>
  </g>

  <!-- LEFT SIDE: Branding + Copy -->

  <!-- Logo -->
  <rect x="60" y="55" width="52" height="52" rx="14" fill="url(#green)"/>
  <text x="86" y="90" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="22" fill="#0a0a0a" text-anchor="middle">TC</text>

  <text x="125" y="78" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="20" fill="#f0f0f0">Twin City <tspan fill="#22c55e">Cannabis</tspan></text>
  <text x="125" y="96" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="11" fill="#666" letter-spacing="2">COMPARE. SAVE. DISCOVER.</text>

  <!-- Headline -->
  <text x="60" y="185" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="48" fill="#ffffff" letter-spacing="-1.5">Every dispensary.</text>
  <text x="60" y="240" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="48" fill="#ffffff" letter-spacing="-1.5">Every price.</text>
  <text x="60" y="295" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="48" fill="#22c55e" letter-spacing="-1.5">One search.</text>

  <!-- Subtitle -->
  <text x="60" y="340" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="18" fill="#888">Compare real prices across 30+ Twin Cities dispensaries.</text>
  <text x="60" y="365" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="18" fill="#888">Real data. Updated daily. Free forever.</text>

  <!-- Stats row -->
  <rect x="60" y="400" width="130" height="60" rx="10" fill="#161616" stroke="#222" stroke-width="1"/>
  <text x="125" y="425" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="22" fill="#22c55e" text-anchor="middle">30+</text>
  <text x="125" y="447" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="11" fill="#888" text-anchor="middle">Dispensaries</text>

  <rect x="200" y="400" width="130" height="60" rx="10" fill="#161616" stroke="#222" stroke-width="1"/>
  <text x="265" y="425" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="22" fill="#22c55e" text-anchor="middle">400+</text>
  <text x="265" y="447" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="11" fill="#888" text-anchor="middle">Products</text>

  <rect x="340" y="400" width="130" height="60" rx="10" fill="#161616" stroke="#222" stroke-width="1"/>
  <text x="405" y="425" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="22" fill="#22c55e" text-anchor="middle">5x</text>
  <text x="405" y="447" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="11" fill="#888" text-anchor="middle">Daily Updates</text>

  <!-- URL -->
  <rect x="60" y="495" width="260" height="44" rx="10" fill="url(#green)"/>
  <text x="190" y="523" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="17" fill="#0a0a0a" text-anchor="middle">twincitycannabis.com</text>

  <text x="60" y="575" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="13" fill="#555">Free for consumers. No app download needed.</text>


  <!-- RIGHT SIDE: UI Preview mockup -->

  <!-- Phone/card mockup area -->
  <rect x="580" y="30" width="580" height="570" rx="20" fill="#111" stroke="#222" stroke-width="1" opacity="0.6"/>

  <!-- Search bar mockup -->
  <rect x="610" y="55" width="520" height="44" rx="10" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <circle cx="636" cy="77" r="10" fill="none" stroke="#555" stroke-width="1.5"/>
  <line x1="643" y1="84" x2="648" y2="89" stroke="#555" stroke-width="1.5"/>
  <text x="660" y="82" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="14" fill="#555">Search strains, products, dispensaries...</text>

  <!-- Dispensary card 1 -->
  <rect x="610" y="120" width="520" height="115" rx="12" fill="#161616" stroke="#222" stroke-width="1"/>
  <!-- Avatar -->
  <rect x="630" y="138" width="60" height="60" rx="10" fill="url(#green)" opacity="0.3"/>
  <text x="660" y="175" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="20" fill="rgba(255,255,255,0.7)" text-anchor="middle">GG</text>
  <!-- Info -->
  <text x="708" y="155" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="16" fill="#f0f0f0">Green Goods Minneapolis</text>
  <text x="708" y="174" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="12" fill="#888">Downtown &bull; Minneapolis</text>
  <text x="708" y="193" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="12" fill="#f59e0b">&#9733;&#9733;&#9733;&#9733;&#9734; <tspan fill="#666">34 reviews</tspan></text>
  <!-- Score -->
  <rect x="1070" y="136" width="42" height="28" rx="6" fill="#22c55e"/>
  <text x="1091" y="156" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="14" fill="#0a0a0a" text-anchor="middle">81</text>
  <!-- Open badge -->
  <rect x="708" y="202" width="52" height="18" rx="9" fill="rgba(34,197,94,0.12)"/>
  <text x="734" y="214" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="9" fill="#22c55e" text-anchor="middle">Open</text>
  <!-- Menu btn -->
  <rect x="1030" y="202" width="82" height="22" rx="6" fill="url(#green)"/>
  <text x="1071" y="217" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="10" fill="#0a0a0a" text-anchor="middle">View Menu</text>

  <!-- Dispensary card 2 -->
  <rect x="610" y="250" width="520" height="115" rx="12" fill="#161616" stroke="#222" stroke-width="1"/>
  <rect x="630" y="268" width="60" height="60" rx="10" fill="linear-gradient(135deg, #7c2d12, #dc2626)" opacity="0.3"/>
  <rect x="630" y="268" width="60" height="60" rx="10" fill="#7c2d12" opacity="0.4"/>
  <text x="660" y="305" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="20" fill="rgba(255,255,255,0.7)" text-anchor="middle">SL</text>
  <text x="708" y="285" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="16" fill="#f0f0f0">Sweetleaves</text>
  <text x="708" y="304" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="12" fill="#888">North Loop &bull; Minneapolis</text>
  <text x="708" y="323" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="12" fill="#f59e0b">&#9733;&#9733;&#9733;&#9733;&#9733; <tspan fill="#666">5 reviews</tspan></text>
  <rect x="1070" y="266" width="42" height="28" rx="6" fill="#22c55e"/>
  <text x="1091" y="286" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="14" fill="#0a0a0a" text-anchor="middle">86</text>
  <rect x="708" y="332" width="72" height="18" rx="9" fill="rgba(34,197,94,0.12)"/>
  <text x="744" y="344" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="9" fill="#22c55e" text-anchor="middle">20 products</text>
  <rect x="1030" y="332" width="82" height="22" rx="6" fill="url(#green)"/>
  <text x="1071" y="347" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="10" fill="#0a0a0a" text-anchor="middle">View Menu</text>

  <!-- Price comparison preview -->
  <rect x="610" y="385" width="520" height="180" rx="12" fill="#161616" stroke="#222" stroke-width="1"/>
  <text x="630" y="412" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="14" fill="#f0f0f0">Price Compare: RYTHM Brownie Scout 3.5g</text>
  <text x="630" y="432" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="11" fill="#666">THC 24.2% &bull; Flower &bull; 6 dispensaries</text>

  <!-- Price rows -->
  <rect x="630" y="448" width="480" height="1" fill="#222"/>

  <text x="640" y="472" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="12" fill="#ccc">Green Goods Minneapolis</text>
  <text x="1090" y="472" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="14" fill="#22c55e" text-anchor="end">$50.00</text>
  <rect x="1095" y="460" width="22" height="18" rx="4" fill="rgba(34,197,94,0.12)"/>
  <text x="1106" y="473" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="8" fill="#22c55e" text-anchor="middle">BEST</text>

  <rect x="630" y="482" width="480" height="1" fill="#1a1a1a"/>

  <text x="640" y="504" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="12" fill="#999">Loon Leaf</text>
  <text x="1090" y="504" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="14" fill="#ccc" text-anchor="end">$50.00</text>

  <rect x="630" y="514" width="480" height="1" fill="#1a1a1a"/>

  <text x="640" y="536" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="12" fill="#999">Green Goods Blaine</text>
  <text x="1090" y="536" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="14" fill="#f97316" text-anchor="end">$52.36</text>
  <text x="1106" y="536" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="10" fill="#666" text-anchor="start">+$2</text>

  <rect x="630" y="546" width="480" height="1" fill="#1a1a1a"/>

  <text x="640" y="558" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="10" fill="#555">+ 3 more dispensaries</text>
</svg>
