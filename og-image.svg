<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0f0d"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="rgba(34,197,94,0.07)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo -->
  <rect x="80" y="70" width="56" height="56" rx="14" fill="url(#green)"/>
  <text x="108" y="107" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="24" fill="#0a0a0a" text-anchor="middle">TC</text>
  <text x="150" y="95" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="22" fill="#f0f0f0">Twin City <tspan fill="#22c55e">Cannabis</tspan></text>
  <text x="150" y="116" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="12" fill="#666" letter-spacing="2.5">MINNEAPOLIS - ST. PAUL</text>

  <!-- Headline -->
  <text x="80" y="220" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="62" fill="#ffffff" letter-spacing="-2">Every dispensary.</text>
  <text x="80" y="290" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="62" fill="#ffffff" letter-spacing="-2">Every price.</text>
  <text x="80" y="360" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="62" fill="#22c55e" letter-spacing="-2">One search.</text>

  <!-- Subtitle -->
  <text x="80" y="415" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="22" fill="#888">Compare real prices across 30+ Twin Cities dispensaries.</text>

  <!-- Stats -->
  <rect x="80" y="460" width="150" height="56" rx="10" fill="#161616" stroke="#282828" stroke-width="1"/>
  <text x="155" y="486" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="20" fill="#22c55e" text-anchor="middle">30+</text>
  <text x="155" y="506" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="12" fill="#777" text-anchor="middle">Dispensaries</text>

  <rect x="245" y="460" width="150" height="56" rx="10" fill="#161616" stroke="#282828" stroke-width="1"/>
  <text x="320" y="486" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="20" fill="#22c55e" text-anchor="middle">400+</text>
  <text x="320" y="506" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="12" fill="#777" text-anchor="middle">Products</text>

  <rect x="410" y="460" width="150" height="56" rx="10" fill="#161616" stroke="#282828" stroke-width="1"/>
  <text x="485" y="486" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="20" fill="#22c55e" text-anchor="middle">Real-Time</text>
  <text x="485" y="506" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="12" fill="#777" text-anchor="middle">Price Updates</text>

  <!-- URL bar -->
  <rect x="80" y="545" width="280" height="48" rx="12" fill="url(#green)"/>
  <text x="220" y="576" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="19" fill="#0a0a0a" text-anchor="middle">twincitycannabis.com</text>

  <text x="385" y="576" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="15" fill="#555">Free for everyone. No app needed.</text>

  <!-- RIGHT SIDE: Floating UI cards -->

  <!-- Card 1: Dispensary -->
  <g transform="translate(720, 80)">
    <rect width="420" height="100" rx="14" fill="#161616" stroke="#282828" stroke-width="1"/>
    <rect x="16" y="18" width="64" height="64" rx="12" fill="#065f46"/>
    <text x="48" y="58" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="22" fill="rgba(255,255,255,0.8)" text-anchor="middle">GG</text>
    <text x="96" y="40" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="16" fill="#f0f0f0">Green Goods Minneapolis</text>
    <text x="96" y="58" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="12" fill="#888">Downtown &#x2022; 10am-8pm &#x2022; 166 products</text>
    <text x="96" y="78" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="13" fill="#f59e0b">&#x2605;&#x2605;&#x2605;&#x2605;&#x2606; <tspan fill="#666" font-size="12">34 reviews</tspan></text>
    <rect x="348" y="16" width="52" height="30" rx="8" fill="#22c55e"/>
    <text x="374" y="37" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="15" fill="#0a0a0a" text-anchor="middle">81</text>
  </g>

  <!-- Card 2: Dispensary -->
  <g transform="translate(750, 200)">
    <rect width="420" height="100" rx="14" fill="#161616" stroke="#282828" stroke-width="1"/>
    <rect x="16" y="18" width="64" height="64" rx="12" fill="#7c2d12"/>
    <text x="48" y="58" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="22" fill="rgba(255,255,255,0.8)" text-anchor="middle">SL</text>
    <text x="96" y="40" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="16" fill="#f0f0f0">Sweetleaves</text>
    <text x="96" y="58" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="12" fill="#888">North Loop &#x2022; 11am-6pm &#x2022; 20 products</text>
    <text x="96" y="78" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="13" fill="#f59e0b">&#x2605;&#x2605;&#x2605;&#x2605;&#x2605; <tspan fill="#666" font-size="12">5 reviews</tspan></text>
    <rect x="348" y="16" width="52" height="30" rx="8" fill="#22c55e"/>
    <text x="374" y="37" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="15" fill="#0a0a0a" text-anchor="middle">86</text>
  </g>

  <!-- Card 3: Price comparison -->
  <g transform="translate(700, 340)">
    <rect width="460" height="240" rx="14" fill="#161616" stroke="#282828" stroke-width="1"/>
    <text x="24" y="32" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="13" fill="#22c55e" letter-spacing="1.5">PRICE COMPARE</text>
    <text x="24" y="56" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="17" fill="#f0f0f0">RYTHM Brownie Scout 3.5g</text>
    <text x="24" y="76" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="12" fill="#666">THC 24.2% &#x2022; Flower &#x2022; Available at 6 dispensaries</text>

    <rect x="24" y="92" width="412" height="1" fill="#282828"/>

    <text x="36" y="118" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="14" fill="#ddd">Green Goods Minneapolis</text>
    <text x="400" y="118" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="16" fill="#22c55e" text-anchor="end">$50</text>
    <rect x="408" y="104" width="30" height="20" rx="4" fill="rgba(34,197,94,0.15)"/>
    <text x="423" y="118" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="9" fill="#22c55e" text-anchor="middle">BEST</text>

    <rect x="24" y="130" width="412" height="1" fill="#1e1e1e"/>

    <text x="36" y="156" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="14" fill="#999">Loon Leaf</text>
    <text x="400" y="156" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="16" fill="#ddd" text-anchor="end">$50</text>

    <rect x="24" y="168" width="412" height="1" fill="#1e1e1e"/>

    <text x="36" y="194" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="14" fill="#999">Green Goods Blaine</text>
    <text x="400" y="194" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="16" fill="#f97316" text-anchor="end">$52.36</text>
    <text x="436" y="194" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="12" fill="#666">+$2</text>

    <rect x="24" y="206" width="412" height="1" fill="#1e1e1e"/>

    <text x="36" y="228" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="12" fill="#555">+ 3 more dispensaries carry this product</text>
  </g>
</svg>
