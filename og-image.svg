<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0e0c"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <radialGradient id="glow" cx="25%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(34,197,94,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Solid background - no gaps -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo -->
  <rect x="80" y="60" width="52" height="52" rx="14" fill="url(#green)"/>
  <text x="106" y="95" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="22" fill="#0a0a0a" text-anchor="middle">TC</text>
  <text x="148" y="84" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="20" fill="#f0f0f0">Twin City <tspan fill="#22c55e">Cannabis</tspan></text>

  <!-- Headline -->
  <text x="80" y="200" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="64" fill="#ffffff" letter-spacing="-2">Every dispensary.</text>
  <text x="80" y="275" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="64" fill="#ffffff" letter-spacing="-2">Every price.</text>
  <text x="80" y="350" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="64" fill="#22c55e" letter-spacing="-2">One search.</text>

  <!-- Subtitle -->
  <text x="80" y="405" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="22" fill="#777">Compare cannabis prices across 33 Twin Cities dispensaries.</text>
  <text x="80" y="435" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="22" fill="#777">1,400+ products. Updated daily. Free.</text>

  <!-- Stats -->
  <rect x="80" y="475" width="140" height="50" rx="10" fill="#161616" stroke="#252525" stroke-width="1"/>
  <text x="150" y="500" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="18" fill="#22c55e" text-anchor="middle">33</text>
  <text x="150" y="517" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="11" fill="#666" text-anchor="middle">Dispensaries</text>

  <rect x="235" y="475" width="140" height="50" rx="10" fill="#161616" stroke="#252525" stroke-width="1"/>
  <text x="305" y="500" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="18" fill="#22c55e" text-anchor="middle">1,400+</text>
  <text x="305" y="517" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="11" fill="#666" text-anchor="middle">Products</text>

  <rect x="390" y="475" width="140" height="50" rx="10" fill="#161616" stroke="#252525" stroke-width="1"/>
  <text x="460" y="500" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="18" fill="#22c55e" text-anchor="middle">Real-Time</text>
  <text x="460" y="517" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="11" fill="#666" text-anchor="middle">Pricing</text>

  <!-- URL -->
  <text x="80" y="580" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="20" fill="#22c55e">twincitycannabis.com</text>
  <text x="335" y="580" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="16" fill="#444">Free for everyone</text>

  <!-- Right side: simple visual accent -->
  <rect x="640" y="0" width="560" height="630" fill="rgba(22,163,74,0.03)"/>

  <!-- Dispensary card mock -->
  <rect x="680" y="100" width="460" height="90" rx="14" fill="#161616" stroke="#252525" stroke-width="1"/>
  <rect x="700" y="118" width="54" height="54" rx="10" fill="#065f46"/>
  <text x="727" y="152" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle">GG</text>
  <text x="770" y="140" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="15" fill="#eee">Green Goods Minneapolis</text>
  <text x="770" y="160" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="12" fill="#666">Downtown &#x2022; 166 products</text>
  <rect x="1082" y="118" width="44" height="26" rx="7" fill="#22c55e"/>
  <text x="1104" y="137" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="13" fill="#0a0a0a" text-anchor="middle">81</text>

  <!-- Dispensary card mock 2 -->
  <rect x="680" y="210" width="460" height="90" rx="14" fill="#161616" stroke="#252525" stroke-width="1"/>
  <rect x="700" y="228" width="54" height="54" rx="10" fill="#7c2d12"/>
  <text x="727" y="262" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle">SL</text>
  <text x="770" y="250" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="15" fill="#eee">Sweetleaves</text>
  <text x="770" y="270" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="12" fill="#666">North Loop &#x2022; 154 products</text>
  <rect x="1082" y="228" width="44" height="26" rx="7" fill="#22c55e"/>
  <text x="1104" y="247" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="13" fill="#0a0a0a" text-anchor="middle">86</text>

  <!-- Price compare mock -->
  <rect x="680" y="320" width="460" height="170" rx="14" fill="#161616" stroke="#252525" stroke-width="1"/>
  <text x="705" y="348" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="11" fill="#22c55e" letter-spacing="1.5">PRICE COMPARE</text>
  <text x="705" y="370" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="15" fill="#eee">Brownie Scout 3.5g</text>
  <text x="705" y="390" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="11" fill="#555">THC 24.2% &#x2022; 6 dispensaries</text>
  <rect x="705" y="400" width="410" height="1" fill="#252525"/>
  <text x="715" y="422" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="13" fill="#ccc">Green Goods</text>
  <text x="1095" y="422" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="15" fill="#22c55e" text-anchor="end">$50</text>
  <rect x="705" y="432" width="410" height="1" fill="#1e1e1e"/>
  <text x="715" y="454" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="13" fill="#888">Loon Leaf</text>
  <text x="1095" y="454" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="15" fill="#ccc" text-anchor="end">$50</text>
  <rect x="705" y="464" width="410" height="1" fill="#1e1e1e"/>
  <text x="715" y="480" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="11" fill="#444">+ 4 more dispensaries</text>
</svg>
