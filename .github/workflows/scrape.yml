name: Scrape Dispensary Data

on:
  schedule:
    # Run 2x daily: 7am and 7pm Central (12:00 and 00:00 UTC)
    - cron: '0 12,0 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Scrape dispensary listings
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python scraper/scraper.py --export
        continue-on-error: true

      - name: Update dispensaries in data.js
        run: python scraper/update_site.py
        continue-on-error: true

      - name: Scrape ALL menus (full product data)
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python scraper/direct_menu_scrape.py --update-site
        continue-on-error: true

      - name: Record price history
        run: |
          python scraper/price_tracker.py record || true
          python scraper/price_tracker.py export || true
        continue-on-error: true

      - name: Pull menus from dispensary.shop platform
        # direct_menu_scrape replaced TCC.products from Weedmaps; this
        # appends shops on the dispensary.shop platform (e.g. Fort Road)
        # with id prefix 'ds####'.
        run: |
          python scraper/dispensary_shop_scrape.py || true
          python scraper/merge_dispensary_shop_data.py || true
          python scraper/meadow_scrape.py || true
          python scraper/merge_meadow_data.py || true
        continue-on-error: true

      - name: Set up Node for SEO build
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild static SEO pages
        run: node scripts/build_seo.js
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "TCC Scraper Bot"
          git config user.email "bot@twincitycannabis.com"
          git add js/data.js index.html sitemap.xml \
            scraper/data/price_history.json scraper/data/price_history_export.json \
            scraper/data/dispensaries.json scraper/data/full_menu_products.json \
            scraper/data/dispensary_shop_products.json \
            dispensaries products brands neighborhoods \
            best-dispensaries-twin-cities cheapest-cannabis-twin-cities minnesota-cannabis-laws 2>/dev/null || true
          # city landing pages (auto-generated, slug pattern: <city>-cannabis-dispensaries)
          for d in *-cannabis-dispensaries; do [ -d "$d" ] && git add "$d"; done
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: $(date -u +%Y-%m-%d\ %H:%M) - fresh prices & menus"
            git push
          fi
