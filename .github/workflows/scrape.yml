name: Scrape Dispensary Data

on:
  schedule:
    # Run every 4 hours for near-real-time data
    # 6am, 10am, 2pm, 6pm, 10pm Central
    - cron: '0 11,15,19,23,3 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scraper.py

      - name: Export to site data
        run: python scraper/scraper.py --export

      - name: Update data.js with fresh prices
        run: python scraper/update_site.py

      - name: Commit and push if changed
        run: |
          git config user.name "TCC Scraper Bot"
          git config user.email "bot@twincitycannabis.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: fresh dispensary prices $(date -u +%Y-%m-%d)"
            git push
          fi
