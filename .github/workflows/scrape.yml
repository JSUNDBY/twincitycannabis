name: Scrape Dispensary Data

on:
  schedule:
    # Run every 4 hours for near-real-time data
    # 6am, 10am, 2pm, 6pm, 10pm Central
    - cron: '0 11,15,19,23,3 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Scrape dispensary listings (Weedmaps API)
        run: python scraper/scraper.py --export
        continue-on-error: true  # Weedmaps blocks datacenter IPs sometimes

      - name: Update dispensaries in data.js
        run: python scraper/update_site.py
        continue-on-error: true  # OK if dispensary scrape failed

      - name: Scrape menus via Apify (real prices & products)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python scraper/apify_scrape.py --update-site
        continue-on-error: true  # Don't fail the whole job if Apify is down

      - name: Commit and push if changed
        run: |
          git config user.name "TCC Scraper Bot"
          git config user.email "bot@twincitycannabis.com"
          git add -A
          # Don't commit the raw scraper dumps
          git reset -- scraper/data/raw_* scraper/data/apify_raw_* 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: dispensary data $(date -u +%Y-%m-%d\ %H:%M)"
            git push
          fi
