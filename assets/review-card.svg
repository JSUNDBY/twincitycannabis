<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="green3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect width="500" height="300" rx="16" fill="url(#bg3)"/>
  <rect x="1" y="1" width="498" height="298" rx="15" fill="none" stroke="#222" stroke-width="1"/>

  <!-- Logo small -->
  <rect x="30" y="25" width="36" height="36" rx="8" fill="url(#green3)"/>
  <text x="48" y="50" font-family="Arial, sans-serif" font-weight="800" font-size="14" fill="#0a0a0a" text-anchor="middle">TC</text>
  <text x="78" y="42" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#f0f0f0">Twin City <tspan fill="#22c55e">Cannabis</tspan></text>
  <text x="78" y="56" font-family="Arial, sans-serif" font-weight="400" font-size="8" fill="#888" letter-spacing="0.5">COMPARE. SAVE. DISCOVER.</text>

  <!-- Divider -->
  <line x1="30" y1="75" x2="470" y2="75" stroke="#222" stroke-width="1"/>

  <!-- Headline -->
  <text x="250" y="115" font-family="Arial, sans-serif" font-weight="800" font-size="22" fill="#f0f0f0" text-anchor="middle">Enjoyed your visit?</text>
  <text x="250" y="145" font-family="Arial, sans-serif" font-weight="400" font-size="14" fill="#999" text-anchor="middle">Leave a review and help other shoppers find great cannabis.</text>

  <!-- Stars -->
  <text x="250" y="185" font-family="Arial, sans-serif" font-size="28" fill="#f59e0b" text-anchor="middle">&#9733; &#9733; &#9733; &#9733; &#9733;</text>

  <!-- QR + CTA -->
  <rect x="170" y="200" width="70" height="70" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="205" y="238" font-family="Arial, sans-serif" font-size="8" fill="#555" text-anchor="middle">QR CODE</text>

  <text x="260" y="228" font-family="Arial, sans-serif" font-weight="600" font-size="13" fill="#f0f0f0">Scan to leave your review</text>
  <text x="260" y="248" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#22c55e">twincitycannabis.com</text>

  <!-- Footer -->
  <text x="250" y="290" font-family="Arial, sans-serif" font-weight="400" font-size="9" fill="#555" text-anchor="middle">Your honest review helps the Twin Cities cannabis community</text>
</svg>
