<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="green2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="700" height="400" rx="20" fill="url(#bg2)"/>
  <rect x="2" y="2" width="696" height="396" rx="18" fill="none" stroke="#222" stroke-width="1"/>

  <!-- Left side: messaging -->
  <!-- Logo -->
  <rect x="40" y="35" width="48" height="48" rx="12" fill="url(#green2)"/>
  <text x="64" y="67" font-family="Arial, sans-serif" font-weight="800" font-size="18" fill="#0a0a0a" text-anchor="middle">TC</text>

  <text x="100" y="56" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="#f0f0f0" letter-spacing="-0.3">Twin City <tspan fill="#22c55e">Cannabis</tspan></text>
  <text x="100" y="72" font-family="Arial, sans-serif" font-weight="400" font-size="9" fill="#888" letter-spacing="0.5">COMPARE PRICES. FIND DEALS. SAVE MONEY.</text>

  <!-- Divider -->
  <line x1="40" y1="95" x2="430" y2="95" stroke="#222" stroke-width="1"/>

  <!-- Headline -->
  <text x="40" y="135" font-family="Arial, sans-serif" font-weight="800" font-size="28" fill="#f0f0f0" letter-spacing="-1">Compare prices at</text>
  <text x="40" y="168" font-family="Arial, sans-serif" font-weight="800" font-size="28" fill="#f0f0f0" letter-spacing="-1">every dispensary in</text>
  <text x="40" y="201" font-family="Arial, sans-serif" font-weight="800" font-size="28" fill="#22c55e" letter-spacing="-1">the Twin Cities.</text>

  <!-- Subtext -->
  <text x="40" y="240" font-family="Arial, sans-serif" font-weight="400" font-size="13" fill="#999">Real prices. Real ratings. Real savings.</text>
  <text x="40" y="260" font-family="Arial, sans-serif" font-weight="400" font-size="13" fill="#999">Scan the QR code to start comparing.</text>

  <!-- Features -->
  <text x="40" y="300" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#22c55e">&#10003;</text>
  <text x="58" y="300" font-family="Arial, sans-serif" font-weight="500" font-size="11" fill="#ccc">Price comparison across 30+ dispensaries</text>

  <text x="40" y="322" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#22c55e">&#10003;</text>
  <text x="58" y="322" font-family="Arial, sans-serif" font-weight="500" font-size="11" fill="#ccc">Daily deal alerts and price drop notifications</text>

  <text x="40" y="344" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#22c55e">&#10003;</text>
  <text x="58" y="344" font-family="Arial, sans-serif" font-weight="500" font-size="11" fill="#ccc">Honest TCC ratings you can trust</text>

  <!-- URL bottom -->
  <text x="40" y="380" font-family="Arial, sans-serif" font-weight="600" font-size="14" fill="#22c55e">twincitycannabis.com</text>

  <!-- Right side: QR code area -->
  <rect x="480" y="60" width="180" height="280" rx="16" fill="#161616" stroke="#222" stroke-width="1"/>

  <!-- QR placeholder -->
  <rect x="510" y="90" width="120" height="120" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="570" y="150" font-family="Arial, sans-serif" font-size="12" fill="#555" text-anchor="middle">QR CODE</text>
  <text x="570" y="167" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">Scan to compare</text>

  <!-- CTA below QR -->
  <text x="570" y="240" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#f0f0f0" text-anchor="middle">Scan to find the</text>
  <text x="570" y="258" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#22c55e" text-anchor="middle">best deals near you</text>

  <!-- Rating badge -->
  <rect x="530" y="280" width="80" height="28" rx="14" fill="url(#green2)"/>
  <text x="570" y="299" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="#0a0a0a" text-anchor="middle">FREE APP</text>

  <text x="570" y="328" font-family="Arial, sans-serif" font-weight="400" font-size="9" fill="#666" text-anchor="middle">No download needed</text>
</svg>
